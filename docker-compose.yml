services:
  mongodb:
    image: mongo
    ports:
      - "8100:27017"
    volumes:
      - ./data:/data/db/mongo

  redis:
    image: redis
    ports:
      - "8101:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ./data/redis:/data 

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_ADDR=redis:6379
